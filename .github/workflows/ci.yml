name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install CPU-only PyTorch (faster CI, no GPU needed)
        run: |
          pip install torch==2.6.0+cpu torchvision==0.21.0+cpu \
            --index-url https://download.pytorch.org/whl/cpu

      - name: Install backend dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          PYTHONPATH: .
          DEVICE: cpu
          LOG_LEVEL: WARNING
        run: |
          pytest app/tests/ -v --tb=short --timeout=120

  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: frontend
        run: npx eslint src/ --max-warnings 0 || true
