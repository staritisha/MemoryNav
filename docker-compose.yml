# docker-compose.yml
# Full MemoryNav stack: FastAPI backend + Next.js frontend.
# Run:   docker compose up --build
# Reset memory: docker compose down && rm -rf ./data/chroma_store ./data/memorynav.db

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: memorynav-backend
    ports:
      - "8000:8000"
    volumes:
      # Persist ChromaDB (long-term spatial memory) across restarts
      - ./data/chroma_store:/app/data/chroma_store
      # Persist SQLite (user preferences) across restarts
      - ./data:/app/data
      # Reuse downloaded model weights
      - ./data/models:/app/data/models
    environment:
      DEVICE: cpu          # Docker can't see host MPS/GPU; run natively for MPS
      LOG_LEVEL: INFO
      # Point config to the container paths (override config.py defaults)
      CHROMA_PERSIST_DIR: /app/data/chroma_store
      SQLITE_DB_PATH:     /app/data/memorynav.db
      YOLO_MODEL_PATH:    /app/data/models/yolov8n.pt
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s   # model loading takes ~30-60s on first run
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # These are baked into the client bundle at build time.
        # They must be the URL reachable from the USER'S BROWSER,
        # not from inside the container — so localhost:8000, not backend:8000.
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_WS_URL:  ws://localhost:8000/ws
    container_name: memorynav-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
